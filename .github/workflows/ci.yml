# CI: フォーマット・静的解析・テスト・ビルド検証。方針は docs/ci.md 参照。
# 実行コマンドはローカルと同一(CI専用ロジックを作らない)。
name: CI

on:
  push:
    branches: [main]
  pull_request:

# GITHUB_TOKEN は読み取りのみ(最小権限)
permissions:
  contents: read

env:
  FLUTTER_VERSION: 3.44.6

defaults:
  run:
    working-directory: app

jobs:
  check:
    name: format / analyze / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: flutter test

  build-web:
    name: build (web)
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter build web

  build-android:
    name: build (android apk)
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      # 固定署名鍵をSecretsから復元(毎回同じ署名 = 端末で上書き更新できる)。
      # フォークPRではSecretsが空なのでスキップされ、デバッグ鍵にフォールバックする。
      - name: Set up release signing
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PW: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > android/app/mokomon-ci.jks
            printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=mokomon\nstoreFile=mokomon-ci.jks\n' \
              "$KEYSTORE_PW" "$KEYSTORE_PW" > android/key.properties
          fi
      # versionCode をビルドごとに増やす(同一番号だと端末が上書きを拒否するため)
      - run: flutter build apk --release --build-number=${{ github.run_number }}
      # 実機での動作確認用にAPKを成果物として保存(Actionsの実行ページからDL)
      - uses: actions/upload-artifact@v4
        with:
          name: mokomon-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

  # main への push ごとに Releases のローリングリリース(apk-latest)へAPKを添付する。
  # Artifacts はスマホ(モバイルアプリ/未ログイン)からDLできないため、
  # スマホでの動作確認は Releases 経由で行う。docs/ci.md 参照。
  release-apk:
    name: publish apk (Releases)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-android
    runs-on: ubuntu-latest
    permissions:
      contents: write # リリース作成・アセット添付に必要(このジョブのみ)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mokomon-apk
      - name: Create or update rolling release
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view apk-latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create apk-latest --repo "$GITHUB_REPOSITORY" \
              --prerelease --title "動作確認用APK(最新main)" \
              --notes "main への push ごとに自動更新される実機動作確認用ビルドです(デバッグ鍵署名)。"
          gh release upload apk-latest app-release.apk --clobber --repo "$GITHUB_REPOSITORY"
