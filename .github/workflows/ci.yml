# CI: フォーマット・静的解析・テスト・ビルド検証。方針は docs/ci.md 参照。
# 実行コマンドはローカルと同一(CI専用ロジックを作らない)。
name: CI

on:
  push:
    branches: [main]
  pull_request:

# GITHUB_TOKEN は読み取りのみ(最小権限)
permissions:
  contents: read

env:
  FLUTTER_VERSION: 3.44.6

defaults:
  run:
    working-directory: app

jobs:
  check:
    name: format / analyze / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: flutter test

  build-web:
    name: build (web)
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter build web

  build-android:
    name: build (android apk)
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      # リリースAPK(現状はFlutter既定のデバッグ鍵署名 = 実機に直接インストール可能)
      - run: flutter build apk --release
      # 実機での動作確認用にAPKを成果物として保存(Actionsの実行ページからDL)
      - uses: actions/upload-artifact@v4
        with:
          name: mokomon-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
